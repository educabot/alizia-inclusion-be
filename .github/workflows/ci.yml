name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

env:
  GOPRIVATE: github.com/educabot/*

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.1"
      - name: Configure private modules
        run: git config --global url."https://x-token:${{ secrets.GH_PAT }}@github.com/educabot/".insteadOf "https://github.com/educabot/"
      - uses: golangci/golangci-lint-action@db582008a42febd596419635a5abc9d9815daa9c # v9.2.1
        with:
          version: v2.12.2

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: alizia_inclusion_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.1"
      - name: Configure private modules
        run: git config --global url."https://x-token:${{ secrets.GH_PAT }}@github.com/educabot/".insteadOf "https://github.com/educabot/"
      - name: Run tests
        run: make test-cover
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/alizia_inclusion_test?sslmode=disable
      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.1"
      - name: Configure private modules
        run: git config --global url."https://x-token:${{ secrets.GH_PAT }}@github.com/educabot/".insteadOf "https://github.com/educabot/"
      - run: make build
