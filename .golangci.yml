version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - govet
    - revive
    - staticcheck
    - unused
  settings:
    errcheck:
      check-type-assertions: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - hugeParam
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    paths:
      - vendor
      - ".*_mock\\.go$"
      - ".*/mocks/.*\\.go$"

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
