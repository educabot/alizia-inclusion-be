run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - gofmt
    - goimports
    - misspell
    - revive

linters-settings:
  errcheck:
    check-type-assertions: true
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style
    disabled-checks:
      - hugeParam
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-dirs:
    - vendor
  exclude-files:
    - ".*_mock\\.go$"
    - ".*/mocks/.*\\.go$"
