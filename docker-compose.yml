services:
  db:
    image: postgres:16-alpine
    container_name: alizia-inclusion-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alizia_inclusion
    ports:
      - "5481:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
